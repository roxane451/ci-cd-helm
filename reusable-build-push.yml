name: Reusable — Build & Push GHCR

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
    outputs:
      image-tag:
        description: "Tag principal de l'image poussée (sha- sur branche, vX.Y.Z sur tag)"
        # outputs.version donne le tag primaire propre (pas la liste multi-lignes)
        value: ${{ jobs.build-push.outputs.image-tag }}

jobs:
  build-push:
    name: Build + Trivy + Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            # FIX: sur push de branche → tag sha-<short>
            type=sha,prefix=sha-,format=short
            # FIX: sur push de tag git (v1.0.0, v1.0.0-rc) → tag sémantique
            # Cela permet au job deploy-preprod/prod d'utiliser github.ref_name
            type=ref,event=tag

      # build local pour scan Trivy (avec cache GHA)
      - name: Build image (local, pour Trivy scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          # cache Docker BuildKit — évite de rebuilder les layers inchangés
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-${{ inputs.image-name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ inputs.image-name }}.sarif

      # push avec cache (réutilise les layers déjà buildés ci-dessus)
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max