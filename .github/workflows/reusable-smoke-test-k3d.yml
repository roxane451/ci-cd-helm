name: Reusable — Smoke Test k3d

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      namespace:
        required: false
        type: string
        default: "ayur-smoke"
    secrets:
      PAT_HELM_REPO:
        required: true

jobs:
  smoke-test:
    name: Smoke test K8s (k3d)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ayur-veda-helm
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ayur-veda-helm
          path: helm-values
          token: ${{ secrets.PAT_HELM_REPO }}

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Créer cluster k3d éphémère
        run: |
          k3d cluster delete smoke-test 2>/dev/null || true
          k3d cluster create smoke-test --wait --timeout 60s

      - name: Configurer kubeconfig
        run: k3d kubeconfig merge smoke-test --kubeconfig-switch-context

      - name: Créer namespace + secret GHCR
        run: |
          kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.PAT_HELM_REPO }} \
            --namespace=${{ inputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Login Helm GHCR
        run: |
          echo "${{ secrets.PAT_HELM_REPO }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Déployer via Helm (values k3d)
        run: |
          helm upgrade --install ayurveda \
            oci://ghcr.io/${{ github.repository_owner }}/multi-service \
            --version 1.0.4 \
            -f helm-values/helm/values-k3d.yaml \
            --namespace ${{ inputs.namespace }} \
            --set backend.image.tag=${{ inputs.image-tag }} \
            --set frontend.image.tag=${{ inputs.image-tag }} \
            --create-namespace \
            --wait --timeout 300s

      - name: Attendre les pods
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=backend \
            --namespace ${{ inputs.namespace }} \
            --timeout=120s
          kubectl wait --for=condition=ready pod \
            -l app=frontend \
            --namespace ${{ inputs.namespace }} \
            --timeout=120s

      - name: Smoke test HTTP
        run: |
          kubectl port-forward svc/backend 3001:5000 \
            --namespace ${{ inputs.namespace }} &
          sleep 5
          curl -f http://localhost:3001/api/health
          kill %1

      - name: Debug pods si échec
        if: failure()
        run: |
          kubectl get pods -n ${{ inputs.namespace }}
          kubectl describe pods -n ${{ inputs.namespace }}
          kubectl logs -l app=backend -n ${{ inputs.namespace }} --tail=50 || true
          kubectl logs -l app=frontend -n ${{ inputs.namespace }} --tail=50 || true
          kubectl logs -l app=mongodb -n ${{ inputs.namespace }} --tail=50 || true

      - name: Cleanup cluster
        if: always()
        run: k3d cluster delete smoke-test
