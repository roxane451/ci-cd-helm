name: Reusable — Build & Push GHCR

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
    outputs:
      image-tag:
        description: "Tag principal de l'image poussée (sha- sur branche, vX.Y.Z sur tag)"
        # outputs.version donne le tag primaire propre (pas la liste multi-lignes)
        value: ${{ jobs.build-push.outputs.image-tag }}

jobs:
  build-push:
    name: Build + Trivy + Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      # Build local avec iidfile pour capturer le digest exact utilisé par Trivy.
      # L'iidfile stocke le sha256 de l'image buildée localement — Trivy
      # scanne ainsi exactement ce qui sera poussé, pas un tag potentiellement stale.
      - name: Build image (local, pour Trivy scan)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          iidfile: /tmp/iid-${{ inputs.image-name }}.txt
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          # Utilise le digest sha256 capturé par iidfile — garantit que Trivy
          # scanne exactement l'image buildée localement (pas un tag stale)
          image-ref: ${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ inputs.image-name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ inputs.image-name }}.sarif

      # Push vers GHCR — réutilise les layers déjà buildés via le cache GHA,
      # pas de rebuild réel (BuildKit retrouve les layers par leur digest)
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
