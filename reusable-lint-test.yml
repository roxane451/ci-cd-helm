name: Reusable — Lint & Test

on:
  workflow_call:

jobs:
  lint-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # npm workspaces — le package-lock.json est UNIQUEMENT à la racine.
      # "npm ci" lancé dans ./frontend ou ./backend cherche un lockfile local
      # qui n'existe pas → erreur "can only install with an existing package-lock.json".
      # Solution : installer depuis la racine, qui installe tous les workspaces.
      - name: Install all dependencies (root workspaces)
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Tests backend
        working-directory: ./backend
        run: npm test

      # FIX: ajout des tests frontend manquants
      - name: Tests frontend
        working-directory: ./frontend
        run: npm test

      - name: npm audit
        run: |
          npm audit --audit-level=high --prefix frontend
          npm audit --audit-level=high --prefix backend